<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحدي</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>التحدي 🔥</h1>
    <p>اضغط على الزر الذي تشجعه!</p>

    <div class="player">
        <div class="button-wrapper">
            <button id="farajBtn" class="btn red">
                <span>فراج</span>
            </button>
            <div id="farajEmojis" class="emoji-container"></div>
        </div>

        <div class="scoreBox">
            <div id="farajBar" class="bar redBar"></div>
        </div>

        <div id="farajCount" class="count">0 ضغطة</div>
    </div>

    <div class="player">
        <div class="button-wrapper">
            <button id="saadBtn" class="btn blue">
                <span>سعد</span>
            </button>
            <div id="saadEmojis" class="emoji-container"></div>
        </div>

        <div class="scoreBox">
            <div id="saadBar" class="bar blueBar"></div>
        </div>

        <div id="saadCount" class="count">0 ضغطة</div>
    </div>

</div>

<script src="script.js?v=2"></script>
</body>
</html>
