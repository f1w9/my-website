<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحدي</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>التحدي 🔥</h1>
    <p>اضغط على الزر الذي تشجعه</p>

    <!-- زر فراج -->

    <div class="player">

        <button id="farajBtn" class="btn red">

            <span>فراج</span>

        </button>

        <div class="scoreBox">

            <div id="farajBar" class="bar"></div>

        </div>

        <div id="farajCount" class="count">

            0 ضغطة

        </div>

    </div>

    <!-- زر سعد -->

    <div class="player">

        <button id="saadBtn" class="btn blue">

            <span>سعد</span>

        </button>

        <div class="scoreBox">

            <div id="saadBar" class="bar blueBar"></div>

        </div>

        <div id="saadCount" class="count">

            0 ضغطة

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
